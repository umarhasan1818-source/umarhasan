<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: radial-gradient(circle, #fcf8f2 0%, #e6d5bc 100%);
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 85vh;
        }
        .cover-card {
            background-color: #fff;
            padding: 50px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 500px;
            border: 2px solid #b3966a;
        }
        .institution {
            font-size: 14px;
            letter-spacing: 2px;
            color: #7f8c8d;
            text-transform: uppercase;
            font-weight: bold;
        }
        .sub-inst {
            font-size: 12px;
            color: #95a5a6;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 42px;
            color: #2c3e50;
            margin: 10px 0;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .separator {
            font-size: 16px;
            color: #b3966a;
            margin: 15px 0;
            font-style: italic;
            letter-spacing: 3px;
        }
        h2 {
            font-size: 36px;
            color: #b3966a;
            margin: 10px 0 50px 0;
            font-weight: 700;
        }
        .author-box {
            margin-top: 50px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .author-name {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
        }
        .author-nim {
            font-size: 14px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="cover-card">
    <div class="institution">Hadist Digital</div>
    <div class="sub-inst">Program Studi Ilmu Hadis UIN SMH Banten</div>
    
    <h1>HADIST</h1>
    <div class="separator">— SEBAGAI —</div>
    <h2>PEDOMAN MUSLIM</h2>
    
    <div class="author-box">
        <div class="author-name">Umar Hasan</div>
        <div class="author-nim">NIM 251305027</div>
    </div>
</div>

</body>
</html>
